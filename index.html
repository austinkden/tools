<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools: austin_kden</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Circle-icons-tools.svg/2048px-Circle-icons-tools.svg.png" type="image/png">
    <style>
        body {
            font-family: Helvetica, sans-serif;
            text-align: left;
            margin-left: 20px;
            margin-top: 10px;
        }
        label {
            font-size: 15px;
            vertical-align: middle;
            margin-right: 10px;
            margin-bottom: 2px;
        }
        input {
            padding: 7px;
            margin-bottom: 15px;
            font-size: 13px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div>
        <label for="waypointInput">Waypoint/Fix:</label>
        <form id="waypointForm" onsubmit="event.preventDefault(); locateWaypoint();">
            <input type="text" id="waypointInput" placeholder="Waypoint" maxlength="5" autofocus>
        </form>
    </div>

    <div>
        <label for="airportInput">Airport Diagram:</label>
        <form id="airportForm" onsubmit="event.preventDefault(); locateAirport();">
            <input type="text" id="airportInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="procedureInput">Procedures:</label>
        <form id="procedureForm" onsubmit="event.preventDefault(); locateProcedure();">
            <input type="text" id="procedureInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="metarInput">METAR:</label>
        <form id="metarForm" onsubmit="event.preventDefault(); locateMETAR();">
            <input type="text" id="metarInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="tafInput">TAF:</label>
        <form id="tafForm" onsubmit="event.preventDefault(); locateTAF();">
            <input type="text" id="tafInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="atisInput">ATIS:</label>
        <form id="atisForm" onsubmit="event.preventDefault(); locateATIS();">
            <input type="text" id="atisInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="notamsInput">NOTAMS:</label>
        <form id="notamsForm" onsubmit="event.preventDefault(); locateNOTAMS();">
            <input type="text" id="notamsInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <div>
        <label for="flightAwareInput">FlightAware:</label>
        <form id="flightAwareForm" onsubmit="event.preventDefault(); locateFlightAware();">
            <input type="text" id="flightAwareInput" placeholder="IATA Code" maxlength="3">
        </form>
    </div>

    <script>
        function locateWaypoint() {
            let waypoint = document.getElementById('waypointInput').value.toUpperCase();
            if (waypoint.length !== 5) {
                alert('Please enter a 5-letter waypoint code.');
                return;
            }
            window.open(`https://opennav.com/waypoint/US/${waypoint}`, '_blank');
        }

        function locateAirport() {
            let airportCode = document.getElementById('airportInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter airport code.');
                return;
            }
            window.open(`https://www.flightaware.com/resources/airport/${airportCode}/APD/AIRPORT+DIAGRAM/pdf`, '_blank');
        }

        function locateProcedure() {
            let airportCode = document.getElementById('procedureInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter airport code.');
                return;
            }
            window.open(`https://www.flightaware.com/resources/airport/K${airportCode}/procedures`, '_blank');
        }

        function locateMETAR() {
            let airportCode = document.getElementById('metarInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter IATA airport code.');
                return;
            }
            window.open(`https://metar-taf.com/livestream/K${airportCode}`, '_blank');
        }

        function locateTAF() {
            let airportCode = document.getElementById('tafInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter IATA airport code.');
                return;
            }
            window.open(`https://metar-taf.com/taf/K${airportCode}`, '_blank');
        }

        function locateATIS() {
            let airportCode = document.getElementById('atisInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter IATA airport code.');
                return;
            }
            window.open(`https://datis.clowd.io/K${airportCode}`, '_blank');
        }

        function locateNOTAMS() {
            let airportCode = document.getElementById('notamsInput').value.toUpperCase();
            if (airportCode.length !== 3) {
                alert('Please enter a 3-letter IATA airport code.');
                return;
            }
            window.open(`https://ourairports.com/airports/K${airportCode}/notams.html`, '_blank');
        }

        function locateFlightAware() {
            let iataCode = document.getElementById('flightAwareInput').value.toUpperCase();
            if (iataCode.length !== 3) {
                alert('Please enter a 3-letter IATA airport code.');
                return;
            }
            // Construct a FlightAware URL by searching for airports with matching ICAO or IATA codes
            window.open(`https://flightaware.com/live/airport/K${iataCode}`, '_blank');
        }
    </script>
</body>
</html>
