<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools: austin_kden</title>
<style>
    body {
        font-family: Helvetica, sans-serif;
        text-align: center;
    }
    input {
        padding: 5px;
        margin: 10px;
        font-size: 12px;
    }
    button {
        padding: 5px 10px;
        font-size: 12px;
    }
</style>
</head>
<body>
    <input type="text" id="waypointInput" placeholder="Waypoint" maxlength="5">
    <button onclick="locateWaypoint()">Locate Waypoint</button>

    <script>
        function locateWaypoint() {
            let waypoint = document.getElementById('waypointInput').value.toUpperCase();
            if (waypoint.length !== 5) {
                alert('Please enter a 5-letter waypoint code.');
                return;
            }

            window.location.href = `https://opennav.com/waypoint/US/${waypoint}`;
        }
    </script>
</body>
</html>
