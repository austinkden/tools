<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools: austin_kden</title>
<style>
    body {
        font-family: Helvetica, sans-serif;
        text-align: center;
    }
    input {
        padding: 5px;
        margin: 10px;
        font-size: 12px;
    }
    button {
        padding: 8px
        margin: 10px;
        font-size: 12px;
        border-radius: 5px;
    }
</style>
</head>
<body>
    <!-- Wrap input and button in a form element -->
    <form id="waypointForm">
        <input type="text" id="waypointInput" placeholder="Waypoint" maxlength="5">
        <button type="submit">Locate Waypoint</button>
    </form>

    <script>
        document.getElementById('waypointForm').onsubmit = function(event) {
            event.preventDefault(); // Prevent the default form submission behavior
            locateWaypoint();
        };

        function locateWaypoint() {
            let waypoint = document.getElementById('waypointInput').value.toUpperCase();
            if (waypoint.length !== 5) {
                alert('Please enter a 5-letter waypoint code.');
                return;
            }

            // Use window.open to open the URL in a new tab
            window.open(`https://opennav.com/waypoint/US/${waypoint}`, '_blank');
        }
    </script>
</body>
</html>
